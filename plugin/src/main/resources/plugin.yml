name: DriftSystem
main: com.driftmc.DriftPlugin
version: "2.0"
api-version: 1.20
author: Xinyue
description: "DriftSystem · 心悦宇宙 · 完全自然语言驱动的AI冒险系统"

commands:
  drift:
    description: "DriftSystem 主命令 (status/sync/debug)"
    usage: "/drift <status|sync|debug|report|where|goto|tutorial>"
    aliases: [ds, heart]

  storycreative:
    description: "开启或关闭剧情创造模式"
    usage: "/storycreative <on|off|status|help>"

  minimap:
    description: "显示心悦宇宙小地图"
    usage: "/minimap"

  talk:
    description: "手动将一句话交给自然语言解析"
    usage: "/talk <message>"

  saytoai:
    description: "向故事引擎发送一句话"
    usage: "/saytoai <message>"

  advance:
    description: "手动推进一次故事"
    usage: "/advance [message]"

  storynext:
    description: "让故事向前推进一步"
    usage: "/storynext"

  heartmenu:
    description: "查看心悦宇宙帮助菜单"
    usage: "/heartmenu"

  level:
    description: "加载指定剧情关卡"
    usage: "/level <level_id>"

  levels:
    description: "查看可用剧情关卡"
    usage: "/levels"

  npc:
    description: "NPC 调试命令"
    usage: "/npc <summon|remove>"

  tp2:
    description: "轻便传送或位移"
    usage: "/tp2 [x y z]"

  time2:
    description: "调节世界时间"
    usage: "/time2 <day|night|tick>"

  sayc:
    description: "以心悦风格广播一句话"
    usage: "/sayc <message>"

  recommend:
    description: "显示 StoryGraph 推荐章节"
    usage: "/recommend"

  questlog:
    description: "显示当前任务日志"
    usage: "/questlog"

  cinematic:
    description: "测试和触发过场动画"
    usage: "/cinematic test"

  taskdebug:
    description: "显示当前任务调试信息"
    usage: "/taskdebug"
    permission: "drift.taskdebug"

  worldstate:
    description: "显示当前世界状态（阶段/资源）"
    usage: "/worldstate"
    permission: "drift.taskdebug"

  leveldebug:
    description: "显示关卡状态机调试信息（阶段/历史/迁移）"
    usage: "/leveldebug"
    permission: "drift.taskdebug"

  eventdebug:
    description: "显示最近规则事件调试信息（collect/npc_trigger/npc_talk等）"
    usage: "/eventdebug"
    permission: "drift.taskdebug"

  spawnfragment:
    description: "根据当前运行态生成并投放场景片段"
    usage: "/spawnfragment"
    permission: "drift.taskdebug"

  storyreset:
    description: "重置当前玩家剧情运行态（任务/事件/库存聚合）"
    usage: "/storyreset"
    permission: "drift.taskdebug"

  debugscene:
    description: "显示 SceneAssembler 生成的 scene/event_plan"
    usage: "/debugscene"
    permission: "drift.taskdebug"

  debuginventory:
    description: "显示 SceneAssembler 使用的库存聚合"
    usage: "/debuginventory"
    permission: "drift.taskdebug"

  predictscene:
    description: "预测当前行为语义将命中的场景（不生成世界）"
    usage: "/predictscene"
    permission: "drift.taskdebug"

  explainscene:
    description: "解释当前场景选择（semantic/resources/root/reason + influence/history）"
    usage: "/explainscene"
    aliases: [explain_scene]
    permission: "drift.taskdebug"

  debugpatch:
    description: "显示最近 world patch 执行回传"
    usage: "/debugpatch"
    permission: "drift.taskdebug"

permissions:
  drift.taskdebug:
    description: "访问任务调试工具"
    default: op